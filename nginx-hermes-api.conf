# Add this block to your existing nginx config at /etc/nginx/sites-available/dualzero
# (or wherever dualzero.duckdns.org is configured).
#
# Exposes Hermes Data API at https://dualzero.duckdns.org/hermes/*
# Behind SSL cert that already exists (Let's Encrypt auto-renew).

# Inside existing server block for dualzero.duckdns.org:

location /hermes/ {
    # Strip /hermes prefix before forwarding
    rewrite ^/hermes/(.*) /$1 break;

    proxy_pass http://127.0.0.1:8091;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # Hide API server from direct access
    proxy_hide_header X-Powered-By;

    # Basic DoS protection at nginx level
    limit_req zone=hermes_api burst=20 nodelay;
}

# At top of http {} block (outside server), add this rate limit zone:
# limit_req_zone $binary_remote_addr zone=hermes_api:10m rate=10r/s;
